track: filesystem_boundary
rules:
  - id: filesystem.boundary.traversal
    pattern: (?i)(path|filepath|directory|dir|join|open|resolve|realpath)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
  - id: filesystem.boundary.tempfile
    pattern: (?i)(tempfile|mktemp|tmp|write_temp)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
