track: crypto
rules:
  - id: crypto.cipher.weak
    pattern: (?i)(encrypt|decrypt|cipher|hash|md5|sha1|des|rc4)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
  - id: crypto.key.management
    pattern: (?i)(key|password|secret|token|aes|generate_key|sign|verify)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
