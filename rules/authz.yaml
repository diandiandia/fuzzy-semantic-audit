track: authz
rules:
  - id: authz.ownership.missing
    pattern: (?i)(ownership|owner|permission|check|authorize|login_required|auth)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
  - id: authz.privilege.escalation
    pattern: (?i)(role|admin|privilege|escalate|sudo|superuser)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
