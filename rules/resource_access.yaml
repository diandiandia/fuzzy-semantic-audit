track: resource_access
rules:
  - id: resource_access.database.direct_query
    pattern: (?i)(db|query|execute|execute_sql|cursor|raw_query)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
  - id: resource_access.network.socket
    pattern: (?i)(socket|connect|bind|listen|send|recv|http_request)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
