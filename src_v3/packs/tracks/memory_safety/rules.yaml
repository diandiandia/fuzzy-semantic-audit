track: memory_safety
rules:
  - id: memory_safety.buffer.unsafe
    pattern: (?i)(malloc|free|calloc|realloc|memcpy|strcpy|sprintf)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
  - id: memory_safety.pointer.raw
    pattern: (?i)(unsafe|pointer|addr|mem|deref)
    kind: function
    ast_query: |
      (function_definition name: (identifier) @name)
